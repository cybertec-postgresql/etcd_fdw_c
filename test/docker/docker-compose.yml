# Local development / smoke environment: one etcd + one PostgreSQL with the
# extension built in.  From the repo root:
#
#   PG_MAJOR=16 ETCD_TAG=v3.5.16 docker compose -f test/docker/docker-compose.yml up --build -d
#   docker compose -f test/docker/docker-compose.yml exec -u postgres pg make -C /src installcheck
#   docker compose -f test/docker/docker-compose.yml down -v
#
services:
  etcd:
    image: quay.io/coreos/etcd:${ETCD_TAG:-v3.5.16}
    command:
      - /usr/local/bin/etcd
      - --name=dev
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 2s
      timeout: 3s
      retries: 20

  pg:
    build:
      context: ../..
      dockerfile: test/docker/Dockerfile
      args:
        PG_MAJOR: ${PG_MAJOR:-16}
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - ../..:/src
    depends_on:
      etcd:
        condition: service_healthy
